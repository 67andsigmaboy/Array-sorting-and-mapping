<!DOCTYPE html>
<html>
    <body>
        <p>multiply every element in the array with 10;</p>
        <p id="demo"></p>
        <script>
            var number = [28,6,19,95];
            function myFunction(num) {
                return num * 10 ;
            }
            var newarray = number.map(myFunction)
            document.getElementById("demo").innerHTML=newarray;
        </script>
    </body>
</html>
